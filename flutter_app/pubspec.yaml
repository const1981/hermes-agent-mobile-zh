name: hermes_agent_mobile
description: Hermes Agent - Flutter-based AI agent manager for Android with a built-in proot runtime.
publish_to: 'none'
version: 0.3.52+84

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  xterm: ^4.0.0
  flutter_pty: ^0.4.2
  dio: ^5.4.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: 2.3.2
  package_info_plus: ^8.1.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0
  google_fonts: ^6.1.0

dependency_overrides:
  shared_preferences_android: 2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/resolv.conf
    - assets/ic_launcher.png
  fonts:
    - family: DejaVuSansMono
      fonts:
        - asset: assets/fonts/DejaVuSansMono.ttf
        - asset: assets/fonts/DejaVuSansMono-Bold.ttf
          weight: 700
