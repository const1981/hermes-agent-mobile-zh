name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Android SDK components (platform / build-tools / NDK)
        run: |
          SDK="${ANDROID_SDK_ROOT}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK (debug-signed, installable)
        working-directory: flutter_app
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-mobile-zh-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
