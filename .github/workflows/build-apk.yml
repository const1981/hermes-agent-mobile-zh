name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# CI 跑在 GitHub 托管的 ubuntu-24.04 云端 runner（非本机 Windows）。
# 该 runner 未预装 Android SDK；本 workflow 用官方 android-actions/setup-android@v4 安装 cmdline-tools + 接受许可（默认已接受），
# 再装 platform-tools / platform 35+36 / build-tools 36 / NDK（NDK 必须显式装，Gradle 不会自动装）。
# 注：插件在 android/build.gradle 的 subprojects 里设 compileSdkVersion=35，所以 android-35 也要装。
# 注意：ANDROID_SDK_ROOT 必须用绝对路径，不要写 $HOME/...（在 job env 里 $HOME 不会被展开）。

env:
  ANDROID_SDK_ROOT: "/home/runner/Android/Sdk"
  ANDROID_HOME: "/home/runner/Android/Sdk"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK (cmdline-tools + accept licenses)
        uses: android-actions/setup-android@v4

      - name: Install SDK packages (platforms 35+36, build-tools, NDK)
        shell: bash
        run: |
          set -e
          # setup-android 已把 sdkmanager 加入 PATH（上面 --version 已验证），直接调用即可
          sdkmanager --version
          # 许可已由 android-actions/setup-android@v4 默认接受；若再跑 yes | sdkmanager --licenses，
          # yes 收 SIGPIPE 会让 set -e 误判失败（上一次就是这么挂的）。这里用 || true 兜底，不影响后续安装。
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "platforms;android-36" "build-tools;36.0.0" "ndk;27.2.12479018"
          echo "SDK 安装完成。"

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      # 固定签名密钥：仓库内已提交 android/app/keystore.p12（固定自签证书，指纹 77f68bb3…），
      # 使我们的 0.3.x 版本之间可互相覆盖升级（CI 默认 debug key 每次都不同，会导致覆盖安装失败）。
      # 直接生成 key.properties 指向仓库内的 keystore，不依赖 Secret（Secret 曾被覆盖导致指纹漂移）。
      - name: Setup fixed signing key (enables overwrite-upgrade)
        working-directory: flutter_app
        shell: bash
        run: |
          if [ -f android/app/keystore.p12 ]; then
            printf 'storeFile=keystore.p12\nstoreType=pkcs12\nkeyAlias=androiddebugkey\nkeyPassword=android\nstorePassword=android\n' > android/key.properties
            echo "fixed signing keystore configured (committed keystore.p12)"
          else
            echo "keystore.p12 missing; using default debug signing"
          fi

      # 关键：必须 --no-tree-shake-icons。否则 MaterialIcons 字体被压到 9.9KB（99.4%），
      # 仅剩极少数字形，App 内所有图标/按钮都会变成方块占位符（v0.3.48 出现的"图标全错"现象）。
      - name: Build release APK (fixed-key signed, installable & overwritable)
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons
        env:
          GRADLE_OPTS: "-Xmx4g"

      # 发布前密钥扫描门禁（apk-security-scan 技能）：反编译 APK 扫 smali 中
      # 硬编码高置信密钥（sk-/ghp_/AKIA/JWT/私钥 等实值）。发现即 FAIL
      # 构建，不发布漏 key 的包。API key 须走 ~/.hermes/.env 的 ${VAR} 引用。
      # 注意：脚本只匹配"密钥实值形状"，不匹 key 名本身，避免误杀构建。
      - name: Secret scan gate (apk-security-scan)
        shell: bash
        run: bash tools/secret_scan.sh flutter_app/build/app/outputs/flutter-apk/app-release.apk

      # 从 pubspec.yaml 读版本号，把 APK 重命名成带版本号的成品名
      # （臣哥规矩：APP 成品文件名必须带版本号，形如 hermes-agent-mobile-v0.3.xx.apk）。
      # pubspec 里形如 "version: 0.3.33+65"，取 + 前面的 0.3.33 作为版本号。
      - name: Rename APK with version suffix
        id: rename_apk
        shell: bash
        run: |
          set -e
          VER=$(grep '^version:' flutter_app/pubspec.yaml | sed -E 's/version:[[:space:]]*([0-9.]+).*/\1/')
          echo "app version = $VER"
          OUT="hermes-agent-mobile-v${VER}.apk"
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk "flutter_app/build/app/outputs/flutter-apk/${OUT}"
          echo "apk_name=${OUT}" >> "$GITHUB_OUTPUT"
          echo "apk_path=flutter_app/build/app/outputs/flutter-apk/${OUT}" >> "$GITHUB_OUTPUT"
          echo "renamed -> ${OUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-app-apk
          path: ${{ steps.rename_apk.outputs.apk_path }}
