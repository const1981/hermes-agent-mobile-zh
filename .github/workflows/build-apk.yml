name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 本仓库的 GitHub Actions 跑在 GitHub 托管的 ubuntu-24.04 云端 runner 上
# （日志可见：`Image Release: ubuntu24/...`、`/home/runner/work/...`、`shell: /usr/bin/bash`）。
# 该 runner **未预装 Android SDK**，所以本 workflow 自行安装：
#   下载 commandlinetools-linux → 解压 → sdkmanager 接受协议 → 装 platform-tools / platform 36 / NDK。
# 注意：NDK 必须显式装（Gradle 不会自动装）；platform 36 与 build-tools 由 AGP 在构建时按需自动下载。
# 之前曾误设成 Windows 路径 + commandlinetools-win + `cmd //c sdkmanager.bat`，在 Linux 上 `cmd` 不存在而失败。

env:
  ANDROID_SDK_ROOT: "$HOME/Android/Sdk"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Android SDK (cmdline-tools + platform 36 + NDK)
        shell: bash
        run: |
          set -e
          SDK="$ANDROID_SDK_ROOT"
          echo "SDK root = $SDK"
          mkdir -p "$SDK"

          # 1) 下载并解压 Linux 版 commandline-tools
          ZIP="$RUNNER_TEMP/cmdline-tools.zip"
          curl -fsSL -o "$ZIP" "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          rm -rf "$RUNNER_TEMP/ct"
          mkdir -p "$RUNNER_TEMP/ct"
          if command -v unzip >/dev/null 2>&1; then
            unzip -q "$ZIP" -d "$RUNNER_TEMP/ct"
          else
            ( cd "$RUNNER_TEMP/ct" && jar xf "$ZIP" )
          fi
          rm -rf "$SDK/cmdline-tools/latest"
          mkdir -p "$SDK/cmdline-tools"
          mv "$RUNNER_TEMP/ct/cmdline-tools" "$SDK/cmdline-tools/latest"
          rm -rf "$RUNNER_TEMP/ct"

          # 2) sdkmanager（Linux 上是 shell 脚本，直接调用，不要走 cmd）
          SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"
          chmod +x "$SDKMANAGER"

          # 3) 接受协议
          yes | "$SDKMANAGER" --sdk_root="$SDK" --licenses

          # 4) 装所需包（platform-tools 便于 adb；platform 36 主目标；NDK 必须显式装）
          "$SDKMANAGER" --sdk_root="$SDK" "platform-tools" "platforms;android-36" "ndk;27.2.12479018"

          echo "SDK 安装完成。"
          "$SDKMANAGER" --sdk_root="$SDK" --list_installed || true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK (debug-signed, installable)
        working-directory: flutter_app
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-app-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
