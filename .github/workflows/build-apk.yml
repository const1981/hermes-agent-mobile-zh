name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# CI 跑在 GitHub 托管的 ubuntu-24.04 云端 runner（非本机 Windows）。
# 该 runner 未预装 Android SDK；本 workflow 用官方 android-actions/setup-android@v4 安装 cmdline-tools + 接受许可（默认已接受），
# 再装 platform-tools / platform 35+36 / build-tools 36 / NDK（NDK 必须显式装，Gradle 不会自动装）。
# 注：插件在 android/build.gradle 的 subprojects 里设 compileSdkVersion=35，所以 android-35 也要装。
# 注意：ANDROID_SDK_ROOT 必须用绝对路径，不要写 $HOME/...（在 job env 里 $HOME 不会被展开）。

env:
  ANDROID_SDK_ROOT: "/home/runner/Android/Sdk"
  ANDROID_HOME: "/home/runner/Android/Sdk"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK (cmdline-tools + accept licenses)
        uses: android-actions/setup-android@v4

      - name: Install SDK packages (platforms 35+36, build-tools, NDK)
        shell: bash
        run: |
          set -e
          # setup-android 已把 sdkmanager 加入 PATH（上面 --version 已验证），直接调用即可
          sdkmanager --version
          # 许可已由 android-actions/setup-android@v4 默认接受；若再跑 yes | sdkmanager --licenses，
          # yes 收 SIGPIPE 会让 set -e 误判失败（上一次就是这么挂的）。这里用 || true 兜底，不影响后续安装。
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "platforms;android-36" "build-tools;36.0.0" "ndk;27.2.12479018"
          echo "SDK 安装完成。"

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      # 固定签名密钥：仓库内已提交 android/app/keystore.p12（固定自签证书，指纹 77f68bb3…），
      # 使我们的 0.3.x 版本之间可互相覆盖升级（CI 默认 debug key 每次都不同，会导致覆盖安装失败）。
      # 直接生成 key.properties 指向仓库内的 keystore，不依赖 Secret（Secret 曾被覆盖导致指纹漂移）。
      - name: Setup fixed signing key (enables overwrite-upgrade)
        working-directory: flutter_app
        shell: bash
        run: |
          if [ -f android/app/keystore.p12 ]; then
            printf 'storeFile=keystore.p12\nstoreType=pkcs12\nkeyAlias=androiddebugkey\nkeyPassword=android\nstorePassword=android\n' > android/key.properties
            echo "fixed signing keystore configured (committed keystore.p12)"
          else
            echo "keystore.p12 missing; using default debug signing"
          fi

      - name: Build release APK (fixed-key signed, installable & overwritable)
        working-directory: flutter_app
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-app-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
