name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# CI 跑在 GitHub 托管的 ubuntu-24.04 云端 runner（非本机 Windows）。
# 该 runner 未预装 Android SDK；本 workflow 用官方 actions/setup-android 安装 cmdline-tools + 接受许可，
# 再装 platform-tools / platform 36 / NDK（NDK 必须显式装，Gradle 不会自动装）。
# 注意：ANDROID_SDK_ROOT 必须用绝对路径，不要写 $HOME/...（在 job env 里 $HOME 不会被展开）。

env:
  ANDROID_SDK_ROOT: "/home/runner/Android/Sdk"
  ANDROID_HOME: "/home/runner/Android/Sdk"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK (cmdline-tools + accept licenses)
        uses: actions/setup-android@v4

      - name: Install platform 36 + NDK
        shell: bash
        run: |
          set -e
          SDK="$ANDROID_SDK_ROOT"
          SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"
          echo "sdkmanager = $SDKMANAGER"
          "$SDKMANAGER" --version
          yes | "$SDKMANAGER" --sdk_root="$SDK" --licenses
          "$SDKMANAGER" --sdk_root="$SDK" "platform-tools" "platforms;android-36" "ndk;27.2.12479018"
          echo "SDK 安装完成。"

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK (debug-signed, installable)
        working-directory: flutter_app
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-app-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
